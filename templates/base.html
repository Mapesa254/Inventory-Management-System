<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory Management Sys{% endblock %}</title>
    <!-- Use our custom clean CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Import a modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">📦 InventoryLite</a>
            <nav class="nav-links">
                <a href="{{ url_for('index') }}">Dashboard</a>
                <a href="{{ url_for('products') }}">Products</a>
                <a href="{{ url_for('add_product') }}" class="btn btn-primary btn-sm">Add Product</a>
            </nav>
        </div>
    </header>
    
    <div class="container main-content">
        <!-- Flash messages for user feedback -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-container">
                {% for message in messages %}
                    <div class="flash-msg">{{ message }}</div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Page specific content -->
        {% block content %}
        {% endblock %}
    </div>

    <footer class="footer">
        <p>&copy; 2026 Inventory Management System - Learner Edition</p>
    </footer>
</body>
</html>
