{% extends 'base.html' %}

{% block title %}Update Product - InventoryLite{% endblock %}

{% block content %}
<div class="form-container mt-5">
    <h1 class="page-title mb-lg">Update Product: {{ product.name }}</h1>
    
    <div class="card p-lg">
        <form method="POST" class="custom-form">
            <div class="form-group row">
                <div class="col-half">
                    <label for="name" class="form-label">Product Name</label>
                    <input type="text" class="form-input" id="name" name="name" value="{{ product.name }}" required>
                </div>
                <div class="col-half">
                    <label for="category" class="form-label">Category</label>
                    <input type="text" class="form-input" id="category" name="category" value="{{ product.category }}" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-input textarea" id="description" name="description" rows="3" required>{{ product.description }}</textarea>
            </div>
            
            <div class="form-group row">
                <div class="col-half">
                    <label for="price" class="form-label">Price ($)</label>
                    <input type="number" step="0.01" class="form-input" id="price" name="price" value="{{ product.price }}" required>
                </div>
                <div class="col-half">
                    <label for="stock" class="form-label">Stock Quantity</label>
                    <input type="number" class="form-input" id="stock" name="stock" value="{{ product.stock }}" required>
                </div>
            </div>
            
            <div class="form-actions mt-lg">
                <button type="submit" class="btn btn-primary">Update Product</button>
                <a href="{{ url_for('products') }}" class="btn btn-secondary text-center">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
